directories:
  buildResources: buildResources
  output: dist
extraFiles:
  - 'LICENSE'
  - 'LICENSE.ScratchFoundation'
  - 'TRADEMARK'
  - 'external-resources'
  - 'firmwares'
  - 'drivers'
  - 'board-packs'
  - from: 'tools'
    to: 'tools'
    filter:
      - '**'
      - '!Arduino/packages/**'

appId: RoboCoders-studio.cc.RoboCoders-studio-desktop
productName: "RoboCoders-studio-Desktop"
publish:
  - provider: github
artifactName: "RoboCoders-studio-Desktop_v${version}_${os}_${arch}.${ext}"

fileAssociations:
  - ext: rc
    name: RoboCoders-studio project file
    role: Editor
    icon: buildResources/OpenBlockFile.ico
  - ext: rcml
    name: RoboCoders ML Model
    role: Editor
    icon: buildResources/OpenBlockMLFile.ico

compression: maximum

mac:
  category: public.app-category.education
  entitlements: buildResources/entitlements.mac.plist
  extendInfo:
    NSCameraUsageDescription: >-
        This app requires camera access when using the video sensing blocks.
    NSMicrophoneUsageDescription: >-
        This app requires microphone access when recording sounds or detecting loudness.
  gatekeeperAssess: true
  hardenedRuntime: true
  icon: buildResources/OpenBlockDesktop.icns
  provisioningProfile: embedded.provisionprofile
  target:
    - dmg
    # - mas
dmg:
  title: "RoboCoders-studio-Desktop_${version}"
  format: UDRO
# mas:
#   category: public.app-category.education
#   entitlements: buildResources/entitlements.mas.plist
#   entitlementsInherit: buildResources/entitlements.mas.inherit.plist
#   hardenedRuntime: false
#   icon: buildResources/OpenBlockDesktop.icns
# masDev:
#   type: development
#   provisioningProfile: mas-dev.provisionprofile

win:
  icon: buildResources/OpenBlockDesktop.ico
  target:
    # - appx
    - nsis
# appx:
#   identityName: "OpenblockTeam.OpenblockDesktop
#   publisherDisplayName: "OpenBlock Team"
#   publisher: "CN=2EC43DF1-469A-4119-9AB9-568A0A1FF65F"
nsis:
  oneClick: false # assisted installer (welcome, board-selection, progress) — not silent
  # Force a SINGLE all-users install location. Without this the user could install
  # per-user AND all-users, producing TWO parallel copies. With perMachine:true + a
  # stable appId, a new build always UPGRADES the existing install in place (overwrites)
  # instead of creating a second one. Also matches the license (machine-bound) + board
  # folder ACL model, which already assume an all-users Program Files install.
  perMachine: true
  # Keep a fixed install directory too, so a new build can't land in a different folder
  # and become a second copy; it always targets the recorded location.
  allowToChangeInstallationDirectory: false
  include: buildResources/installer.nsh
  buildUniversalInstaller: false
#   license: LICENSE

linux:
  category: Education
  icon: buildResources/linux
  desktop:
    entry:
      Encoding: UTF-8
      Name: RoboCoders-studio-Desktop
      Icon: openblock-desktop
      Type: Application
      Terminal: false
  target:
    - deb
deb:
  depends: ["libnotify4", "libxtst6", "libnss3"]
